<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLESHIP WAR ⚓</title>
    <!-- PWA & Theme Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000033">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #ui, #mobileControls, #fireButton {
            user-select: none;
            pointer-events: auto;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
        }
        .stat-line { font-size: 18px; font-weight: bold; margin-bottom: 2px; }
        #health-val { color: #ff4757; }
        #score-val { color: #eccc68; }
        
        /* Main Menu Overlay */
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,31,63,0.9), rgba(0,63,127,0.9));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
        }
        #menu h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Mobile Layout */
        #mobileControls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: none;
            gap: 10px;
            z-index: 15;
        }
        #fireButton {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: none;
            width: 80px;
            height: 80px;
            background: rgba(255, 71, 87, 0.8);
            border-radius: 50%;
            border: 4px solid white;
            color: white;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 15;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 8px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlays */
        #pauseScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        #pauseScreen { background: rgba(0, 0, 0, 0.7); }
        #gameOverScreen { background: rgba(0, 0, 0, 0.9); }
        
        button {
            padding: 12px 30px;
            font-size: 20px;
            margin-top: 20px;
            cursor: pointer;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            pointer-events: none;
            opacity: 0.6;
            z-index: 2;
        }

        /* Show mobile controls only on touch devices */
        @media (pointer: coarse) {
            #mobileControls, #fireButton { display: flex; }
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>⚓ BATTLESHIP WAR 😈</h1>
    <p>Sink the enemy fleet. Watch for incoming lead-shots.</p>
    <button onclick="startGame()">START MISSION</button>
    <div style="margin-top: 20px; font-size: 0.9em; opacity: 0.8;">
        WASD to Move | Aim with Mouse/Touch | Click to Fire
    </div>
</div>

<div id="crosshair">+</div>

<div id="ui">
    <div class="stat-line">Hull: <span id="health-val">100</span>%</div>
    <div class="stat-line">Score: <span id="score-val">0</span></div>
    <div id="wave-indicator" style="color: #70a1ff; font-weight: bold;">Wave 1</div>
</div>

<div id="mobileControls">
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="ctrl-btn" ontouchstart="keys['w']=true" ontouchend="keys['w']=false">↑</div>
        <div style="display:flex; gap:10px;">
            <div class="ctrl-btn" ontouchstart="keys['a']=true" ontouchend="keys['a']=false">←</div>
            <div class="ctrl-btn" ontouchstart="keys['s']=true" ontouchend="keys['s']=false">↓</div>
            <div class="ctrl-btn" ontouchstart="keys['d']=true" ontouchend="keys['d']=false">→</div>
        </div>
    </div>
</div>

<div id="fireButton" ontouchstart="shoot()">FIRE</div>

<div id="pauseScreen">
    <div style="font-weight: bold; font-size: 40px;">PAUSED</div>
    <button onclick="togglePause()">RESUME</button>
</div>

<div id="gameOverScreen">
    <div style="color: #ff4757; font-weight: bold; font-size: 40px;">SHIP SUNK</div>
    <div style="font-size: 24px; margin-top: 10px;">Final Score: <span id="finalScore">0</span></div>
    <button onclick="restartGame()">RESTART</button>
</div>

<script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';

    // --- PWA Registration (Disabled for Compatibility in current environment) ---
    /*
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("Service Worker Registered 😈"))
        .catch(err => console.error("SW Registration failed: ", err));
    }
    */

    // --- State ---
    let playerHealth = 100;
    let score = 0;
    let wave = 1;
    let shake = 0;
    let isPaused = false;
    let isGameOver = false;
    let gameStarted = false;
    let canShoot = true;

    // --- Physics ---
    let velocity = new THREE.Vector3();
    const accelerationForce = 0.02;
    const drag = 0.98;
    const turnSpeed = 0.02;

    // --- Scene ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 50, 250);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
    sunLight.position.set(50, 100, 50);
    scene.add(sunLight);

    // --- Ocean ---
    const oceanGeometry = new THREE.PlaneGeometry(600, 600, 80, 80);
    const oceanMaterial = new THREE.MeshPhongMaterial({
        color: 0x1e90ff,
        flatShading: true,
        transparent: true,
        opacity: 0.85,
    });
    const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
    ocean.rotation.x = -Math.PI / 2;
    scene.add(ocean);

    function getWaveHeight(x, z, time) {
        return (Math.sin(x * 0.2 + time) + Math.cos(z * 0.2 + time)) * 0.35;
    }

    // --- Ship ---
    const ship = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 6), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    hull.position.y = 0.6;
    ship.add(hull);
    const turret = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 16), new THREE.MeshPhongMaterial({ color: 0x111111 }));
    turret.position.y = 1.7;
    ship.add(turret);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 2.5, 8), new THREE.MeshPhongMaterial({ color: 0x000000 }));
    barrel.rotation.z = Math.PI / 2;
    barrel.position.set(0, 1.7, 1.2); 
    ship.add(barrel);
    scene.add(ship);

    // --- Arrays ---
    const cannonballs = [];
    const enemies = [];
    const enemyBullets = [];
    const explosions = [];

    // --- Global Actions ---
    window.startGame = () => {
        document.getElementById("menu").style.display = "none";
        gameStarted = true;
    };

    window.togglePause = () => {
        if (isGameOver) return;
        isPaused = !isPaused;
        document.getElementById("pauseScreen").style.display = isPaused ? "flex" : "none";
    };

    window.restartGame = () => {
        location.reload();
    };

    window.shoot = () => {
        if (!gameStarted || isPaused || isGameOver || !canShoot) return;
        
        canShoot = false;
        setTimeout(() => { canShoot = true; }, 600);

        const ball = new THREE.Mesh(
            new THREE.SphereGeometry(0.4, 12, 12),
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 })
        );

        const shootDir = new THREE.Vector3(Math.sin(turret.rotation.y + ship.rotation.y), 0, Math.cos(turret.rotation.y + ship.rotation.y));
        const spawnPos = new THREE.Vector3().copy(ship.position);
        spawnPos.add(shootDir.clone().multiplyScalar(3.5));
        spawnPos.y = ship.position.y + 1.2;

        ball.position.copy(spawnPos);
        ball.userData.velocity = shootDir.clone().multiplyScalar(1.9).add(velocity.clone().multiplyScalar(0.4));
        ball.userData.velocity.y = 0.08;
        ball.userData.gravity = -0.003;
        ball.userData.bornAt = Date.now();
        
        // Recoil
        velocity.add(shootDir.clone().multiplyScalar(-0.12));

        scene.add(ball);
        cannonballs.push(ball);

        if (cannonballs.length > 30) {
            scene.remove(cannonballs[0]);
            cannonballs.shift();
        }
    };

    function createExplosion(position, color = 0xffaa00) {
        const geo = new THREE.SphereGeometry(0.6, 12, 12);
        const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true });
        const exp = new THREE.Mesh(geo, mat);
        exp.position.copy(position);
        exp.userData.life = 25;
        scene.add(exp);
        explosions.push(exp);
        shake = 0.5;
    }

    function spawnEnemy() {
        if (enemies.length > 15) return;

        const enemy = new THREE.Group();
        const eHull = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 6), new THREE.MeshPhongMaterial({ color: 0x880000 }));
        eHull.position.y = 0.6;
        enemy.add(eHull);
        const eTurret = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16), new THREE.MeshPhongMaterial({ color: 0x440000 }));
        eTurret.position.y = 1.6;
        enemy.add(eTurret);
        
        const angle = Math.random() * Math.PI * 2;
        const radius = 90 + Math.random() * 50;
        enemy.position.set(ship.position.x + Math.cos(angle) * radius, 0, ship.position.z + Math.sin(angle) * radius);
        enemy.userData.health = 40 + (wave * 10);
        
        scene.add(enemy);
        enemies.push(enemy);
    }

    function spawnWave() {
        document.getElementById("wave-indicator").textContent = `Wave ${wave}`;
        const count = 2 + wave;
        for (let i = 0; i < count; i++) spawnEnemy();
    }
    
    spawnWave();

    // --- Controls ---
    const keys = {};
    window.keys = keys;
    document.addEventListener("keydown", (e) => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === "Escape") togglePause();
    });
    document.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
    window.addEventListener("click", (e) => {
        if(e.target.tagName !== "BUTTON") shoot();
    });

    // --- Animation ---
    function animate() {
        requestAnimationFrame(animate);

        if (!gameStarted) {
            renderer.render(scene, camera);
            return;
        }

        if (isPaused || isGameOver) {
            renderer.render(scene, camera);
            return;
        }

        const time = Date.now() * 0.001;

        // UI
        document.getElementById("health-val").textContent = Math.max(0, Math.floor(playerHealth));
        document.getElementById("score-val").textContent = score;

        // Turret rotation
        const lookDir = new THREE.Vector3();
        camera.getWorldDirection(lookDir);
        const worldAimAngle = Math.atan2(lookDir.x, lookDir.z);
        const targetLocalAngle = worldAimAngle - ship.rotation.y;
        turret.rotation.y += (targetLocalAngle - turret.rotation.y) * 0.15;
        barrel.rotation.y = turret.rotation.y;

        // Ocean
        const posAttr = ocean.geometry.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getY(i);
            posAttr.setZ(i, getWaveHeight(x, z, time));
        }
        posAttr.needsUpdate = true;

        // Movement
        const shipForward = new THREE.Vector3(-Math.sin(ship.rotation.y), 0, -Math.cos(ship.rotation.y));
        if (keys["w"]) velocity.add(shipForward.clone().multiplyScalar(accelerationForce));
        if (keys["s"]) velocity.add(shipForward.clone().multiplyScalar(-accelerationForce));
        velocity.multiplyScalar(drag);
        if (keys["a"]) ship.rotation.y += turnSpeed * (velocity.length() * 5);
        if (keys["d"]) ship.rotation.y -= turnSpeed * (velocity.length() * 5);
        ship.position.add(velocity);

        ship.position.y = getWaveHeight(ship.position.x, ship.position.z, time) + 0.5;
        const speed = velocity.length();
        ship.rotation.z = -((keys["a"] ? 1 : keys["d"] ? -1 : 0) * speed * 0.6);
        ship.rotation.x = speed * 0.3;

        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            const enemy = enemies[i];
            const dist = ship.position.distanceTo(enemy.position);
            const angle = Math.atan2(ship.position.x - enemy.position.x, ship.position.z - enemy.position.z);
            
            enemy.rotation.y = angle;
            enemy.position.x += Math.sin(angle) * 0.04;
            enemy.position.z += Math.cos(angle) * 0.04;
            enemy.position.y = getWaveHeight(enemy.position.x, enemy.position.z, time) + 0.5;

            if (dist < 3.8) {
                const impactDamage = velocity.length() * 150;
                playerHealth -= impactDamage * 0.3;
                enemy.userData.health -= impactDamage;
                const push = new THREE.Vector3().subVectors(enemy.position, ship.position).normalize();
                velocity.add(push.clone().multiplyScalar(-0.3));
                enemy.position.add(push.clone().multiplyScalar(1.5));
                ship.position.add(push.clone().multiplyScalar(-0.8));
                createExplosion(enemy.position, 0xff0000);
            }

            if (Math.random() < 0.008 && dist < 130) {
                const lead = ship.position.clone().add(velocity.clone().multiplyScalar(22));
                const dir = new THREE.Vector3().subVectors(lead, enemy.position).normalize();
                const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffdd00 }));
                bullet.position.copy(enemy.position).setY(1.5);
                bullet.userData.velocity = dir.multiplyScalar(0.9);
                scene.add(bullet);
                enemyBullets.push(bullet);
            }

            if (enemy.userData.health <= 0) {
                createExplosion(enemy.position, 0xff3300);
                scene.remove(enemy);
                enemies.splice(i, 1);
                score += 50;
                if (enemies.length === 0) { wave++; spawnWave(); }
            }
        }

        // Bullets
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const b = enemyBullets[i];
            b.position.add(b.userData.velocity);
            if (b.position.distanceTo(ship.position) < 3.0) {
                playerHealth -= 10;
                createExplosion(ship.position);
                scene.remove(b);
                enemyBullets.splice(i, 1);
                if (playerHealth <= 0) {
                    isGameOver = true;
                    document.getElementById("finalScore").textContent = score;
                    document.getElementById("gameOverScreen").style.display = "flex";
                }
            } else if (b.position.length() > 500) {
                scene.remove(b);
                enemyBullets.splice(i, 1);
            }
        }

        for (let i = cannonballs.length - 1; i >= 0; i--) {
            const ball = cannonballs[i];
            ball.userData.velocity.y += ball.userData.gravity;
            ball.userData.velocity.multiplyScalar(0.996); 
            ball.position.add(ball.userData.velocity);

            const wh = getWaveHeight(ball.position.x, ball.position.z, time);
            if (ball.position.y <= wh) {
                createExplosion(ball.position, 0x99ccff);
                scene.remove(ball);
                cannonballs.splice(i, 1);
                continue;
            }

            for (let j = enemies.length - 1; j >= 0; j--) {
                const enemy = enemies[j];
                if (ball.position.distanceTo(enemy.position) < 3.5) {
                    enemy.userData.health -= 25;
                    createExplosion(ball.position);
                    scene.remove(ball);
                    cannonballs.splice(i, 1);
                    break;
                }
            }
        }

        for (let i = explosions.length - 1; i >= 0; i--) {
            const exp = explosions[i];
            exp.scale.addScalar(0.15);
            exp.material.opacity = exp.userData.life / 25;
            exp.userData.life--;
            if (exp.userData.life <= 0) { scene.remove(exp); explosions.splice(i, 1); }
        }

        const camOffset = new THREE.Vector3(0, 12, 24);
        camOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), ship.rotation.y);
        camera.position.copy(ship.position).add(camOffset);
        
        if (shake > 0) {
            camera.position.x += (Math.random() - 0.5) * shake;
            camera.position.y += (Math.random() - 0.5) * shake;
            shake *= 0.9;
        }
        
        camera.lookAt(ship.position.x, ship.position.y + 1, ship.position.z);
        renderer.render(scene, camera);
    }

    window.onload = () => { animate(); document.body.focus(); };
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
